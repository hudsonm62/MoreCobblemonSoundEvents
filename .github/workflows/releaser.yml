name: 📦 Releaser

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⚙️ Checkout code
        uses: actions/checkout@v6

      - name: 🔍 Get Mod Version
        id: get-version
        run: |
          $Version = (Get-Content gradle.properties | Select-String '^mod_version=').ToString().Split('=')[1].Trim()
          echo "version=$Version" >> $env:GITHUB_OUTPUT

      - name: 🔍 Check Tag doesn't exist
        id: get-tag
        run: |
          $Tag = "v${{ steps.get-version.outputs.version }}"

          git fetch --tags
          $tagExists = git tag --list $Tag
          if ($tagExists) {
            throw "❌ Tag '$Tag' already exists. Aborting release."
          }
          Write-Host "✅ Tag '$Tag' does not exist. Proceeding with release."

          # Set output for next step
          echo "version=$Tag" >> $env:GITHUB_OUTPUT

      - name: ⚙️ Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: microsoft

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: ⚙️ Make Gradlew Executable
        shell: bash
        run: chmod +x ./gradlew

      - name: 🔨 Build Mod
        shell: bash
        run: ./gradlew build

      - name: 🩹 Get Short SHA
        id: short-sha
        uses: hudsonm62/short-sha@v1

      - name: 🏷️ Create Tag
        id: create-tag
        run: |
          $Tag = "${{ steps.get-tag.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$Tag" -m "$Tag"
          git push origin "$Tag"

      # this includes sources jar, which we don't want in the release
      - name: 📤 Upload Mod Artifact
        uses: actions/upload-artifact@v7
        with:
          name: MoreCobblemonSoundEvents-${{ steps.short-sha.outputs.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/libs/*.jar
          if-no-files-found: error
          compression-level: 9

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get-tag.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          append_body: true
          files: build/libs/MoreCobblemonSoundEvents-${{ steps.get-version.outputs.version }}.jar
